<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" role="img" aria-labelledby="ucpTitle ucpDesc" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <title id="ucpTitle">The SysManage unified control plane</title>
  <desc id="ucpDesc">Six operating systems are managed through one SysManage control plane that delivers inventory, patching, vulnerability, compliance, automation, and reporting.</desc>
  <defs>
    <linearGradient id="ucpHub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1565a0"/>
      <stop offset="1" stop-color="#1b5e34"/>
    </linearGradient>
    <marker id="ain" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#4a9fd8"/></marker>
    <marker id="aout" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#5fa865"/></marker>
  </defs>

  <!-- Left: operating systems -->
  <g font-size="15">
    <rect x="24" y="70"  width="150" height="38" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.4"/><text x="99" y="94"  text-anchor="middle" fill="#0d3d5c">Windows</text>
    <rect x="24" y="126" width="150" height="38" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.4"/><text x="99" y="150" text-anchor="middle" fill="#0d3d5c">Linux</text>
    <rect x="24" y="182" width="150" height="38" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.4"/><text x="99" y="206" text-anchor="middle" fill="#0d3d5c">macOS</text>
    <rect x="24" y="238" width="150" height="38" rx="9" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.4"/><text x="99" y="262" text-anchor="middle" fill="#1b5e34">FreeBSD</text>
    <rect x="24" y="294" width="150" height="38" rx="9" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.4"/><text x="99" y="318" text-anchor="middle" fill="#1b5e34">OpenBSD</text>
    <rect x="24" y="350" width="150" height="38" rx="9" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.4"/><text x="99" y="374" text-anchor="middle" fill="#1b5e34">NetBSD</text>
    <!-- arrows in -->
    <line x1="176" y1="89"  x2="378" y2="205" stroke="#4a9fd8" stroke-width="1.6" marker-end="url(#ain)"/>
    <line x1="176" y1="145" x2="378" y2="215" stroke="#4a9fd8" stroke-width="1.6" marker-end="url(#ain)"/>
    <line x1="176" y1="201" x2="378" y2="225" stroke="#4a9fd8" stroke-width="1.6" marker-end="url(#ain)"/>
    <line x1="176" y1="257" x2="378" y2="245" stroke="#5fa865" stroke-width="1.6" marker-end="url(#ain)"/>
    <line x1="176" y1="313" x2="378" y2="255" stroke="#5fa865" stroke-width="1.6" marker-end="url(#ain)"/>
    <line x1="176" y1="369" x2="378" y2="265" stroke="#5fa865" stroke-width="1.6" marker-end="url(#ain)"/>
  </g>

  <!-- Center hub -->
  <rect x="382" y="170" width="196" height="120" rx="18" fill="url(#ucpHub)"/>
  <text x="480" y="222" text-anchor="middle" font-size="22" font-weight="800" fill="#ffffff">SysManage</text>
  <text x="480" y="248" text-anchor="middle" font-size="13.5" fill="#d6eaf8">Unified Control Plane</text>

  <!-- Right: capabilities -->
  <g font-size="15">
    <line x1="582" y1="205" x2="784" y2="89"  stroke="#5fa865" stroke-width="1.6" marker-end="url(#aout)"/>
    <line x1="582" y1="215" x2="784" y2="145" stroke="#5fa865" stroke-width="1.6" marker-end="url(#aout)"/>
    <line x1="582" y1="225" x2="784" y2="201" stroke="#5fa865" stroke-width="1.6" marker-end="url(#aout)"/>
    <line x1="582" y1="245" x2="784" y2="257" stroke="#5fa865" stroke-width="1.6" marker-end="url(#aout)"/>
    <line x1="582" y1="255" x2="784" y2="313" stroke="#5fa865" stroke-width="1.6" marker-end="url(#aout)"/>
    <line x1="582" y1="265" x2="784" y2="369" stroke="#5fa865" stroke-width="1.6" marker-end="url(#aout)"/>
    <rect x="786" y="70"  width="150" height="38" rx="9" fill="#ffffff" stroke="#2e7d47" stroke-width="1.4"/><text x="861" y="94"  text-anchor="middle" fill="#1b5e34" font-weight="600">Inventory</text>
    <rect x="786" y="126" width="150" height="38" rx="9" fill="#ffffff" stroke="#2e7d47" stroke-width="1.4"/><text x="861" y="150" text-anchor="middle" fill="#1b5e34" font-weight="600">Patching</text>
    <rect x="786" y="182" width="150" height="38" rx="9" fill="#ffffff" stroke="#2e7d47" stroke-width="1.4"/><text x="861" y="206" text-anchor="middle" fill="#1b5e34" font-weight="600">Vulnerabilities</text>
    <rect x="786" y="238" width="150" height="38" rx="9" fill="#ffffff" stroke="#2e7d47" stroke-width="1.4"/><text x="861" y="262" text-anchor="middle" fill="#1b5e34" font-weight="600">Compliance</text>
    <rect x="786" y="294" width="150" height="38" rx="9" fill="#ffffff" stroke="#2e7d47" stroke-width="1.4"/><text x="861" y="318" text-anchor="middle" fill="#1b5e34" font-weight="600">Automation</text>
    <rect x="786" y="350" width="150" height="38" rx="9" fill="#ffffff" stroke="#2e7d47" stroke-width="1.4"/><text x="861" y="374" text-anchor="middle" fill="#1b5e34" font-weight="600">Reporting</text>
  </g>
</svg>
