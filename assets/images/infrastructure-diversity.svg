<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="divTitle divDesc" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <title id="divTitle">Infrastructure diversity, then and now</title>
  <desc id="divDesc">Twenty years ago most environments were mostly Windows; today a single enterprise runs many operating systems and platforms.</desc>

  <!-- Headers -->
  <text x="215" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#6c7a89" letter-spacing="1">~2005</text>
  <text x="700" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#0d3d5c" letter-spacing="1">TODAY</text>

  <line x1="430" y1="70" x2="430" y2="380" stroke="#e8eaed" stroke-width="2"/>

  <!-- Then: mostly one platform -->
  <rect x="95" y="120" width="240" height="180" rx="16" fill="#eef4fb" stroke="#4a9fd8" stroke-width="2"/>
  <text x="215" y="205" text-anchor="middle" font-size="26" font-weight="700" fill="#0d3d5c">Windows</text>
  <text x="215" y="238" text-anchor="middle" font-size="15" fill="#6c7a89">(mostly)</text>

  <!-- Now: heterogeneous cluster -->
  <g font-size="14.5">
    <rect x="470" y="86" width="118" height="34" rx="8" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.3"/><text x="529" y="108" text-anchor="middle" fill="#0d3d5c">Windows</text>
    <rect x="600" y="86" width="118" height="34" rx="8" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.3"/><text x="659" y="108" text-anchor="middle" fill="#0d3d5c">Linux</text>
    <rect x="730" y="86" width="118" height="34" rx="8" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.3"/><text x="789" y="108" text-anchor="middle" fill="#0d3d5c">macOS</text>

    <rect x="470" y="130" width="118" height="34" rx="8" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.3"/><text x="529" y="152" text-anchor="middle" fill="#3d4a5c">Cloud</text>
    <rect x="600" y="130" width="118" height="34" rx="8" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.3"/><text x="659" y="152" text-anchor="middle" fill="#3d4a5c">Containers</text>
    <rect x="730" y="130" width="118" height="34" rx="8" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.3"/><text x="789" y="152" text-anchor="middle" fill="#3d4a5c">Virtualization</text>

    <rect x="470" y="174" width="118" height="34" rx="8" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.3"/><text x="529" y="196" text-anchor="middle" fill="#1b5e34">FreeBSD</text>
    <rect x="600" y="174" width="118" height="34" rx="8" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.3"/><text x="659" y="196" text-anchor="middle" fill="#1b5e34">OpenBSD</text>
    <rect x="730" y="174" width="118" height="34" rx="8" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.3"/><text x="789" y="196" text-anchor="middle" fill="#1b5e34">NetBSD</text>

    <rect x="470" y="218" width="118" height="34" rx="8" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.3"/><text x="529" y="240" text-anchor="middle" fill="#3d4a5c">Appliances</text>
    <rect x="600" y="218" width="118" height="34" rx="8" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.3"/><text x="659" y="240" text-anchor="middle" fill="#3d4a5c">Remote sites</text>
    <rect x="730" y="218" width="118" height="34" rx="8" fill="#f6efe6" stroke="#e68619" stroke-width="1.3"/><text x="789" y="240" text-anchor="middle" fill="#8a5210">Air-gapped</text>
  </g>

  <text x="700" y="300" text-anchor="middle" font-size="15" fill="#6c7a89" font-style="italic">…managed by tools that still assume one operating system.</text>
</svg>
