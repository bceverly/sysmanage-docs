<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="fragTitle fragDesc" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
  <title id="fragTitle">From a tool per operating system to one control plane</title>
  <desc id="fragDesc">Today, each operating system is wired to its own management tool; with SysManage, every operating system is managed from one control plane.</desc>
  <defs>
    <linearGradient id="smHub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1565a0"/>
      <stop offset="1" stop-color="#1b5e34"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6c7a89"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2e7d47"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="215" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#6c7a89" letter-spacing="2">TODAY</text>
  <text x="740" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1b5e34" letter-spacing="2">WITH SYSMANAGE</text>

  <!-- Divider -->
  <line x1="480" y1="70" x2="480" y2="500" stroke="#e8eaed" stroke-width="2"/>

  <!-- TODAY: OS -> tool pairs -->
  <g font-size="17">
    <!-- rows: OS box, arrow, tool box -->
    <!-- 1 -->
    <rect x="20" y="80" width="140" height="46" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.5"/>
    <text x="90" y="109" text-anchor="middle" fill="#0d3d5c" font-weight="600">Windows</text>
    <line x1="168" y1="103" x2="205" y2="103" stroke="#6c7a89" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="212" y="80" width="200" height="46" rx="9" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.5"/>
    <text x="312" y="109" text-anchor="middle" fill="#3d4a5c">Intune / SCCM</text>
    <!-- 2 -->
    <rect x="20" y="160" width="140" height="46" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.5"/>
    <text x="90" y="189" text-anchor="middle" fill="#0d3d5c" font-weight="600">Ubuntu</text>
    <line x1="168" y1="183" x2="205" y2="183" stroke="#6c7a89" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="212" y="160" width="200" height="46" rx="9" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.5"/>
    <text x="312" y="189" text-anchor="middle" fill="#3d4a5c">Landscape</text>
    <!-- 3 -->
    <rect x="20" y="240" width="140" height="46" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.5"/>
    <text x="90" y="269" text-anchor="middle" fill="#0d3d5c" font-weight="600">RHEL</text>
    <line x1="168" y1="263" x2="205" y2="263" stroke="#6c7a89" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="212" y="240" width="200" height="46" rx="9" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.5"/>
    <text x="312" y="269" text-anchor="middle" fill="#3d4a5c">Satellite</text>
    <!-- 4 -->
    <rect x="20" y="320" width="140" height="46" rx="9" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.5"/>
    <text x="90" y="349" text-anchor="middle" fill="#0d3d5c" font-weight="600">macOS</text>
    <line x1="168" y1="343" x2="205" y2="343" stroke="#6c7a89" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="212" y="320" width="200" height="46" rx="9" fill="#f5f6f8" stroke="#b0b8c1" stroke-width="1.5"/>
    <text x="312" y="349" text-anchor="middle" fill="#3d4a5c">Jamf</text>
    <!-- 5 -->
    <rect x="20" y="400" width="140" height="46" rx="9" fill="#f6efe6" stroke="#e68619" stroke-width="1.5"/>
    <text x="90" y="429" text-anchor="middle" fill="#8a5210" font-weight="600">FreeBSD / *BSD</text>
    <line x1="168" y1="423" x2="205" y2="423" stroke="#6c7a89" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="212" y="400" width="200" height="46" rx="9" fill="#faf3ea" stroke="#e0b483" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="312" y="429" text-anchor="middle" fill="#8a5210">custom scripts</text>
  </g>
  <text x="215" y="482" text-anchor="middle" font-size="14" fill="#6c7a89" font-style="italic">+ separate scanners, patch &amp; compliance tools</text>

  <!-- TOMORROW: OS chips converge into one hub -->
  <g font-size="15">
    <rect x="545" y="86" width="130" height="34" rx="8" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.3"/>
    <text x="610" y="108" text-anchor="middle" fill="#0d3d5c">Windows</text>
    <rect x="545" y="130" width="130" height="34" rx="8" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.3"/>
    <text x="610" y="152" text-anchor="middle" fill="#0d3d5c">Linux</text>
    <rect x="545" y="174" width="130" height="34" rx="8" fill="#eef4fb" stroke="#4a9fd8" stroke-width="1.3"/>
    <text x="610" y="196" text-anchor="middle" fill="#0d3d5c">macOS</text>
    <rect x="545" y="218" width="130" height="34" rx="8" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.3"/>
    <text x="610" y="240" text-anchor="middle" fill="#1b5e34">FreeBSD</text>
    <rect x="545" y="262" width="130" height="34" rx="8" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.3"/>
    <text x="610" y="284" text-anchor="middle" fill="#1b5e34">OpenBSD</text>
    <rect x="545" y="306" width="130" height="34" rx="8" fill="#e6f2e9" stroke="#5fa865" stroke-width="1.3"/>
    <text x="610" y="328" text-anchor="middle" fill="#1b5e34">NetBSD</text>

    <!-- converging arrows -->
    <path d="M675 103 C 710 103 700 207 728 207" fill="none" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowG)"/>
    <path d="M675 147 C 705 147 705 210 728 210" fill="none" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowG)"/>
    <path d="M675 191 C 700 191 705 213 728 213" fill="none" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowG)"/>
    <path d="M675 235 C 700 235 705 216 728 216" fill="none" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowG)"/>
    <path d="M675 279 C 705 279 705 219 728 219" fill="none" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowG)"/>
    <path d="M675 323 C 710 323 700 222 728 222" fill="none" stroke="#2e7d47" stroke-width="1.8" marker-end="url(#arrowG)"/>
  </g>

  <!-- SysManage hub -->
  <rect x="735" y="150" width="200" height="130" rx="16" fill="url(#smHub)"/>
  <text x="835" y="205" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">SysManage</text>
  <text x="835" y="234" text-anchor="middle" font-size="14" fill="#d6eaf8">One control plane</text>
  <text x="740" y="482" text-anchor="middle" font-size="14" fill="#1b5e34" font-style="italic" font-weight="600" transform="translate(95,0)">inventory · patch · vulnerabilities · compliance</text>
</svg>
