name: Deploy to GitHub Pages

# Replaces GitHub's auto "pages-build-deployment" (which runs the deprecated
# Node 20 actions/checkout@v4 + actions/upload-artifact@v4) with a controlled
# build on the current action versions, and stages ONLY the published site so
# the upload doesn't include .git / node_modules / dev tooling.
#
# IMPORTANT: in repo Settings → Pages, set "Build and deployment → Source" to
# "GitHub Actions" so this workflow is what deploys (otherwise the legacy
# branch auto-build keeps running alongside it).
#
# The apt/rpm/... package repo (repo/) is NOT published to Pages — it's synced
# to Cloudflare R2 (served at https://repo.sysmanage.org) and excluded from the
# _site artifact below, which keeps the Pages upload under its 1 GB limit.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # NOTE: the package repo (repo/) is NOT part of this repo anymore — it's
      # gitignored and published straight to Cloudflare R2 (https://repo.sysmanage.org)
      # by the sysmanage / sysmanage-agent release pipelines.  Version retention
      # is `make prune-repo` here.  So this workflow only builds+deploys the docs
      # site; there's no repo/ to sync.

      - name: Stage published site (exclude dev/build dirs)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'screenshots' \
            --exclude 'scripts' \
            --exclude 'Presentations' \
            --exclude 'SignPath' \
            --exclude 'repo' \
            --exclude '_site' \
            ./ _site/
          echo "Staged site size:"
          du -sh _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
