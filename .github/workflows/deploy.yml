name: Deploy to GitHub Pages

# Replaces GitHub's auto "pages-build-deployment" (which runs the deprecated
# Node 20 actions/checkout@v4 + actions/upload-artifact@v4) with a controlled
# build on the current action versions, and stages ONLY the published site so
# the upload doesn't include .git / node_modules / dev tooling.
#
# IMPORTANT: in repo Settings → Pages, set "Build and deployment → Source" to
# "GitHub Actions" so this workflow is what deploys (otherwise the legacy
# branch auto-build keeps running alongside it).
#
# The apt/rpm/... package repo (repo/) is NOT published to Pages — it's synced
# to Cloudflare R2 (served at https://repo.sysmanage.org) and excluded from the
# _site artifact below, which keeps the Pages upload under its 1 GB limit.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # The package repo (repo/, ~1.2GB) is hosted on Cloudflare R2, not Pages
      # (Pages caps published artifacts at 1GB).  Sync it up first so the
      # published download URLs (https://repo.sysmanage.org/...) stay current,
      # THEN exclude it from the Pages artifact below.
      # --size-only: git checkout resets file mtimes to "now", so a normal
      # mtime-based sync would re-upload the whole ~1.2GB every deploy; compare
      # by size instead (package artifacts are versioned/content-addressed, so
      # a same-name+same-size object is genuinely identical).
      # --delete: mirror repo/ exactly, so versions pruned locally by
      # `make prune-repo` (retention: keep latest 5) also drop off R2.  The
      # hashFiles guard below refuses to run on an empty/missing repo/, so a
      # bad checkout can't wipe the published packages.
      - name: Sync package repo to Cloudflare R2
        if: ${{ hashFiles('repo/**') != '' }}
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          # Safety tripwire: dry-run first and count how many objects the sync
          # WOULD change.  Abort before any billable write/delete if that's
          # abnormally large — catches a bug re-uploading the whole repo (~5.6k
          # objects) or a bad checkout mass-deleting the bucket via --delete.
          # Normal deploys touch a handful of files.
          PLANNED=$(aws s3 sync repo/ "s3://${R2_BUCKET}/" \
            --endpoint-url "$ENDPOINT" --region auto --size-only --delete --dryrun \
            | wc -l)
          echo "R2 sync would change ${PLANNED} object(s)."
          THRESHOLD=1500
          if [ "$PLANNED" -gt "$THRESHOLD" ]; then
            echo "::error::R2 sync would change ${PLANNED} objects (> ${THRESHOLD}) — aborting to avoid runaway operations/cost or an accidental mass-delete. If intentional (re-seed or a big new platform), run the sync manually or raise THRESHOLD."
            exit 1
          fi
          aws s3 sync repo/ "s3://${R2_BUCKET}/" \
            --endpoint-url "$ENDPOINT" --region auto --size-only --delete \
            --only-show-errors
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Work around aws-cli v2.23+ default integrity checksums that R2 rejects.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required

      - name: Stage published site (exclude dev/build dirs)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'screenshots' \
            --exclude 'scripts' \
            --exclude 'Presentations' \
            --exclude 'SignPath' \
            --exclude 'repo' \
            --exclude '_site' \
            ./ _site/
          echo "Staged site size:"
          du -sh _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
